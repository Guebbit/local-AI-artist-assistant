services:
  sd-webui:
    build:
      context: .
      dockerfile: Containerfile
    container_name: sd-webui
    ports:
      - "7860:7860"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DOWNLOAD_SDXL=${DOWNLOAD_SDXL:-1}
      - LORA_LINEART_ENHANCER_URL=${LORA_LINEART_ENHANCER_URL:-}
      - LORA_TATTOO_STYLE_URL=${LORA_TATTOO_STYLE_URL:-}
      - LORA_MANGA_INK_URL=${LORA_MANGA_INK_URL:-}
    volumes:
      - ./data:/data:Z
      - ./config:/config:Z
      - ./outputs:/outputs:Z
      - ./scripts:/workspace/scripts:Z
      - ./examples:/workspace/examples:Z
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    restart: unless-stopped

  inkify-api:
    image: python:3.10-slim
    container_name: inkify-api
    depends_on:
      - sd-webui
    working_dir: /api
    command: >
      sh -c "pip install --no-cache-dir -r /api/requirements.txt &&
      uvicorn inkify_api:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./api:/api:Z
      - ./config:/config:Z,ro
    ports:
      - "8000:8000"
    restart: unless-stopped
